name: "Test Package"
description: "Installs the built package and verifies the installed binaries can run"

inputs:
  like:
    description: "Used only on linux distro type: debian, fedora, suse, arch"
    required: false
    default: ""

runs:
  using: "composite"

  steps:
    - name: Test package
      shell: bash
      run: |
        if [ "$RUNNER_OS" == "macOS" ]; then
          dmg=$(ls build/uniflow-*.dmg | head -1)
          echo "Y" | hdiutil attach "$dmg" -nobrowse -mountpoint /tmp/uniflow-dmg
          /tmp/uniflow-dmg/Uniflow.app/Contents/MacOS/uniflow-core --version
          hdiutil detach /tmp/uniflow-dmg

        elif [ "$RUNNER_OS" == "Windows" ]; then
          7z x build/uniflow-*-portable.7z -otmp/uniflow-pkg
          exe=$(find tmp/uniflow-pkg -name "uniflow-core.exe" -type f | head -1)
          exe_dir=$(dirname "$exe")
          pkg_root=$(dirname "$exe_dir")
          export PATH="$exe_dir:$pkg_root:$pkg_root/lib:$PATH"
          "$exe" --version

        elif [ "$RUNNER_OS" == "Linux" ]; then
          if [ "${{inputs.like}}" == "debian" ]; then
            apt-get install -y ./build/uniflow-*.deb
          elif [ "${{inputs.like}}" == "fedora" ]; then
            dnf install -y build/uniflow-*.rpm
          elif [ "${{inputs.like}}" == "suse" ]; then
            zypper install -y --allow-unsigned-rpm build/uniflow-*.rpm
          elif [ "${{inputs.like}}" == "arch" ]; then
            pacman -U --noconfirm build/uniflow-*.pkg.tar.zst
          else
            echo "Unknown like: ${{inputs.like}}"
            exit 1
          fi
          QT_QPA_PLATFORM=minimal uniflow-core --version

        else
          echo "Unknown OS: $RUNNER_OS"
          exit 1
        fi
